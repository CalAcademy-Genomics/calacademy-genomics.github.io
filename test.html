<h1>CCG Sample Location Tracker V 0.004 </h1>
<p style="font-size:1.1rem; color:#666;">Track the physical location of samples within CCG freezers.</p>

<style>
  .tracker-form { background: #f5f6fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; }
  .tracker-form label { display: block; font-weight: 600; margin-top: 0.75rem; }
  .tracker-form input, .tracker-form select, .tracker-form textarea {
    width: 100%; padding: 0.4rem; margin-top: 0.25rem;
    border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem;
    box-sizing: border-box;
  }
  .tracker-form button { margin-top: 1rem; padding: 0.5rem 1.25rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
  .btn-add { background: #2869e6; color: #fff; }
  .btn-add:hover { background: #1b4fb5; }
  .btn-add:disabled { background: #aaa; cursor: not-allowed; }
  .btn-export { background: #27ae60; color: #fff; border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; }
  .btn-export:hover { background: #1e8e4e; }
  .btn-import { background: #8e44ad; color: #fff; border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; }
  .btn-import:hover { background: #6c3483; }
  .btn-clear { background: #e67e22; color: #fff; border: none; border-radius: 4px; padding: 0.4rem 1rem; cursor: pointer; }
  .btn-clear:hover { background: #d35400; }
  .btn-danger { background: #e74c3c; color: #fff; font-size: 0.8rem; padding: 0.25rem 0.6rem; border: none; border-radius: 4px; cursor: pointer; }
  .btn-danger:hover { background: #c0392b; }
  #sample-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
  #sample-table th, #sample-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
  #sample-table th { background: #2869e6; color: #fff; cursor: pointer; user-select: none; }
  #sample-table th:hover { background: #1b4fb5; }
  #sample-table tr:nth-child(even) { background: #f9f9f9; }
  .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .toolbar input[type="text"] { flex: 1; min-width: 200px; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; }
  .count-badge { background: #eee; padding: 0.3rem 0.7rem; border-radius: 12px; font-size: 0.85rem; white-space: nowrap; }
  #import-file { display: none; }
  .status-msg { padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
  .status-msg.success { display: block; background: #d4edda; color: #155724; }
  .status-msg.error { display: block; background: #f8d7da; color: #721c24; }
  .status-msg.loading { display: block; background: #fff3cd; color: #856404; }
</style>

<div class="status-msg" id="status-msg"></div>

<div class="tracker-form" id="add-form">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 0 1rem;">
    <div>
      <label for="sample-id">Sample ID</label>
      <input type="text" id="sample-id" placeholder="e.g., CAS-12345" />
    </div>
    <div>
      <label for="species">Species</label>
      <input type="text" id="species" placeholder="e.g., Solanum nelsonii" />
    </div>
    <div>
      <label for="freezer-type">Freezer Type</label>
      <select id="freezer-type">
        <option value="" selected disabled>Select freezer type</option>
        <option value="-20">-20C</option>
        <option value="-80">-80C</option>
      </select>
    </div>
    <div>
      <label for="freezer-id">Freezer</label>
      <select id="freezer-id">
        <option value="" selected disabled>Select freezer type first</option>
      </select>
    </div>
    <div>
      <label for="shelf">Shelf</label>
      <select id="shelf">
        <option value="1">Shelf 1</option>
        <option value="2">Shelf 2</option>
        <option value="3">Shelf 3</option>
        <option value="4">Shelf 4</option>
      </select>
    </div>
    <div>
      <label for="box">Box / Position (optional)</label>
      <input type="text" id="box" placeholder="e.g., Box 3, Slot 12" />
    </div>
  </div>
  <label for="notes">Notes (optional)</label>
  <textarea id="notes" rows="2" placeholder="Any additional info"></textarea>
  <br />
  <button class="btn-add" id="btn-add-sample" type="button">Add Sample</button>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search samples..." />
  <select id="filter-freezer-type">
    <option value="">All freezer types</option>
    <option value="-20">-20C only</option>
    <option value="-80">-80C only</option>
  </select>
  <span class="count-badge" id="count-badge">0 samples</span>
  <button class="btn-export" id="btn-export" type="button">Export CSV</button>
  <button class="btn-import" id="btn-import" type="button">Import CSV</button>
  <input type="file" id="import-file" accept=".csv" />
</div>

<table id="sample-table">
  <thead>
    <tr>
      <th data-sort="Sample ID">Sample ID</th>
      <th data-sort="Species">Species</th>
      <th data-sort="Freezer Type">Freezer Type</th>
      <th data-sort="Freezer">Freezer</th>
      <th data-sort="Shelf">Shelf</th>
      <th data-sort="Box/Position">Box / Position</th>
      <th data-sort="Notes">Notes</th>
      <th data-sort="Date Added">Date Added</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="sample-tbody"></tbody>
</table>

<script>
document.addEventListener('DOMContentLoaded', function() {

  // ============================================================
  // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE:
  var SCRIPT_URL = 'https://script.google.com/a/macros/calacademy.org/s/AKfycbxKtrDwjrO0dejNxWuSuEoej4KMc7Mx2ibnVpuAHBSNfnsefZe1VDM7eGC1xPe6qFpm5Q/exec';
  // ============================================================

  var FREEZERS = {
    '-20': [
      { id: 'A', label: 'A' },
      { id: 'B', label: 'B' },
      { id: 'C', label: 'C' }
    ],
    '-80': [
      { id: '1', label: '1' },
      { id: '2', label: '2' },
      { id: '3', label: '3' }
    ]
  };

  var samples = [];
  var sortField = 'Date Added';
  var sortAsc = false;

  function showStatus(msg, type) {
    var el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
    if (type === 'success') {
      setTimeout(function() { el.className = 'status-msg'; }, 3000);
    }
  }

  function esc(str) {
    var d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  // ── Load samples from Google Sheet ──
  function loadSamples() {
    showStatus('Loading samples...', 'loading');
    fetch(SCRIPT_URL)
      .then(function(res) { return res.json(); })
      .then(function(json) {
        samples = json.data || [];
        renderTable();
        showStatus('', '');
      })
      .catch(function(err) {
        showStatus('Failed to load samples: ' + err.message, 'error');
      });
  }

  // ── Freezer dropdown ──
  function updateFreezerOptions() {
    var type = document.getElementById('freezer-type').value;
    var sel = document.getElementById('freezer-id');
    sel.innerHTML = '';
    if (!type) {
      var placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.disabled = true;
      placeholder.selected = true;
      placeholder.textContent = 'Select freezer type first';
      sel.appendChild(placeholder);
      return;
    }
    var list = FREEZERS[type] || [];
    for (var i = 0; i < list.length; i++) {
      var opt = document.createElement('option');
      opt.value = list[i].id;
      opt.textContent = list[i].label;
      sel.appendChild(opt);
    }
  }

  // ── Add sample ──
  function addSample() {
    var sampleId = document.getElementById('sample-id').value.trim();
    var species = document.getElementById('species').value.trim();
    var freezerType = document.getElementById('freezer-type').value;
    var freezerId = document.getElementById('freezer-id').value;

    if (!sampleId) { alert('Sample ID is required.'); return; }
    if (!freezerType) { alert('Please select a freezer type.'); return; }
    if (!freezerId) { alert('Please select a freezer.'); return; }

    var btn = document.getElementById('btn-add-sample');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    var entry = {
      action: 'add',
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      sampleId: sampleId,
      species: species,
      freezerType: freezerType,
      freezerId: freezerId,
      shelf: document.getElementById('shelf').value,
      box: document.getElementById('box').value.trim(),
      notes: document.getElementById('notes').value.trim(),
      dateAdded: new Date().toISOString().slice(0, 10)
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(entry)
    })
    .then(function(res) { return res.json(); })
    .then(function(json) {
      showStatus('Sample added!', 'success');
      document.getElementById('sample-id').value = '';
      document.getElementById('species').value = '';
      document.getElementById('box').value = '';
      document.getElementById('notes').value = '';
      document.getElementById('sample-id').focus();
      loadSamples();
    })
    .catch(function(err) {
      showStatus('Failed to add sample: ' + err.message, 'error');
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = 'Add Sample';
    });
  }

  // ── Delete sample ──
  function deleteSample(id) {
    if (!confirm('Remove this sample?')) return;
    showStatus('Deleting...', 'loading');

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id: id })
    })
    .then(function(res) { return res.json(); })
    .then(function(json) {
      showStatus('Sample removed.', 'success');
      loadSamples();
    })
    .catch(function(err) {
      showStatus('Failed to delete: ' + err.message, 'error');
    });
  }

  // ── Render table ──
  function renderTable() {
    var query = document.getElementById('search').value.toLowerCase();
    var filterType = document.getElementById('filter-freezer-type').value;

    var filtered = samples.filter(function(s) {
      if (filterType && s['Freezer Type'] !== filterType) return false;
      if (query) {
        var haystack = [
          s['Sample ID'], s['Species'], s['Freezer'], s['Shelf'],
          s['Box/Position'], s['Notes'], s['Date Added']
        ].join(' ').toLowerCase();
        if (haystack.indexOf(query) === -1) return false;
      }
      return true;
    });

    filtered.sort(function(a, b) {
      var va = (a[sortField] || '').toString().toLowerCase();
      var vb = (b[sortField] || '').toString().toLowerCase();
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });

    var tbody = document.getElementById('sample-tbody');
    tbody.innerHTML = '';

    for (var i = 0; i < filtered.length; i++) {
      var s = filtered[i];
      var tr = document.createElement('tr');

      tr.innerHTML =
        '<td>' + esc(s['Sample ID']) + '</td>' +
        '<td><em>' + esc(s['Species']) + '</em></td>' +
        '<td>' + esc(s['Freezer Type']) + 'C</td>' +
        '<td>' + esc(s['Freezer']) + '</td>' +
        '<td>' + esc(s['Shelf']) + '</td>' +
        '<td>' + esc(s['Box/Position']) + '</td>' +
        '<td>' + esc(s['Notes']) + '</td>' +
        '<td>' + esc(s['Date Added']) + '</td>' +
        '<td></td>';

      var deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-danger';
      deleteBtn.type = 'button';
      deleteBtn.textContent = 'Remove';
      deleteBtn.setAttribute('data-delete-id', s['ID']);
      tr.lastChild.appendChild(deleteBtn);
      tbody.appendChild(tr);
    }

    document.getElementById('count-badge').textContent = filtered.length + ' of ' + samples.length + ' samples';
  }

  // ── Export CSV ──
  function exportCSV() {
    if (!samples.length) { alert('No samples to export.'); return; }
    var hdrs = ['Sample ID','Species','Freezer Type','Freezer','Shelf','Box/Position','Notes','Date Added'];
    var rows = samples.map(function(s) {
      return hdrs.map(function(h) { return s[h] || ''; });
    });
    var all = [hdrs].concat(rows);
    var csv = all.map(function(r) {
      return r.map(function(c) { return '"' + String(c).replace(/"/g, '""') + '"'; }).join(',');
    }).join('\n');
    var blob = new Blob([csv], { type: 'text/csv' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ccg_samples_' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // ── Import CSV ──
  function parseCSVLine(line) {
    var result = [];
    var current = '';
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { current += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { result.push(current.trim()); current = ''; }
        else { current += ch; }
      }
    }
    result.push(current.trim());
    return result;
  }

  function importCSV(fileInput) {
    var file = fileInput.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var lines = e.target.result.split('\n').filter(function(l) { return l.trim(); });
      var imported = 0;
      var pending = [];
      for (var i = 1; i < lines.length; i++) {
        var cols = parseCSVLine(lines[i]);
        if (cols.length < 4) continue;
        pending.push({
          action: 'add',
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6) + i,
          sampleId: cols[0] || '',
          species: cols[1] || '',
          freezerType: cols[2] || '-80',
          freezerId: cols[3] || '',
          shelf: cols[4] || '1',
          box: cols[5] || '',
          notes: cols[6] || '',
          dateAdded: cols[7] || new Date().toISOString().slice(0, 10)
        });
      }
      showStatus('Importing ' + pending.length + ' samples...', 'loading');
      var chain = Promise.resolve();
      pending.forEach(function(entry) {
        chain = chain.then(function() {
          return fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(entry)
          });
        });
      });
      chain.then(function() {
        showStatus('Imported ' + pending.length + ' samples!', 'success');
        loadSamples();
        fileInput.value = '';
      }).catch(function(err) {
        showStatus('Import error: ' + err.message, 'error');
      });
    };
    reader.readAsText(file);
  }

  // ── Wire up event listeners ──
  document.getElementById('btn-add-sample').addEventListener('click', function(e) {
    e.preventDefault();
    addSample();
  });

  document.getElementById('freezer-type').addEventListener('change', updateFreezerOptions);
  document.getElementById('search').addEventListener('input', renderTable);
  document.getElementById('filter-freezer-type').addEventListener('change', renderTable);
  document.getElementById('btn-export').addEventListener('click', exportCSV);

  document.getElementById('btn-import').addEventListener('click', function() {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', function() {
    importCSV(this);
  });

  // delete button delegation
  document.getElementById('sample-tbody').addEventListener('click', function(e) {
    var btn = e.target;
    if (btn.hasAttribute('data-delete-id')) {
      deleteSample(btn.getAttribute('data-delete-id'));
    }
  });

  // sortable column headers
  var ths = document.querySelectorAll('#sample-table th[data-sort]');
  for (var h = 0; h < ths.length; h++) {
    (function(header) {
      header.addEventListener('click', function() {
        var field = header.getAttribute('data-sort');
        if (sortField === field) { sortAsc = !sortAsc; }
        else { sortField = field; sortAsc = true; }
        renderTable();
      });
    })(ths[h]);
  }

  // Enter key submits form
  document.getElementById('add-form').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      e.preventDefault();
      addSample();
    }
  });

  // ── Initialize ──
  loadSamples();
});
</script>
